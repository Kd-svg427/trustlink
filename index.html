<style>

  /* ── Brand gradients ── */

  .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(217,119,6,0.45); }
  .btn-outline { background: white; border: 2px solid #166534; color: #166534; transition: all 0.25s; }
  .btn-outline:hover { background: #f0fdf4; transform: translateY(-2px); }
  .btn-ghost { background: transparent; border: 1.5px solid #e5e5e5; color: #525252; transition: all 0.25s; }
  .btn-ghost:hover { border-color: #16a34a; color: #16a34a; background: #f0fdf4; }

  .tab-btn.active { background: white; color: #166534; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }

  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.55); backdrop-filter:blur(6px); z-index:1000; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal-box { background:white; border-radius:20px; max-width:560px; width:100%; max-height:90vh; overflow-y:auto; padding:32px; box-shadow: 0 25px 60px rgba(0,0,0,0.2); }

  .toast { position:fixed; bottom:24px; right:24px; z-index:9999; background:white; border:1px solid #e5e5e5; border-radius:14px; padding:14px 20px; display:flex; align-items:center; gap:10px; min-width:300px; box-shadow:0 16px 40px rgba(0,0,0,0.12); animation: toastIn 0.35s cubic-bezier(.2,0,.2,1); }

  @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp 0.4s ease forwards; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner { width:22px; height:22px; border:2.5px solid rgba(22,163,74,0.25); border-top-color:#16a34a; border-radius:50%; animation:spin 0.75s linear infinite; }

  /* ── Price ── */
  .price-tag { color:#166534; font-weight:700; }

  /* ── Table ── */
  table { width:100%; border-collapse:collapse; font-size:14px; }
  thead th { background:#f5f5f5; color:#737373; font-size:11px; text-transform:uppercase; letter-spacing:.06em; padding:12px 16px; text-align:left; font-weight:700; }
  tbody td { padding:14px 16px; border-bottom:1px solid #f5f5f5; vertical-align:middle; }
  tbody tr:hover td { background:#fafafa; }
  tbody tr:last-child td { border-bottom:none; }

  /* ── Sections ── */
  .section-label { display:inline-flex; align-items:center; gap:6px; background:#f0fdf4; color:#166534; border:1px solid #bbf7d0; font-size:12px; font-weight:700; padding:5px 14px; border-radius:20px; }
  .section-title { font-size:2.2rem; font-weight:800; line-height:1.2; }

  /* ── WhatsApp btn ── */
  .btn-whatsapp { background:#25D366; color:white; transition:all .2s; }

  .sidebar-link { display:flex; align-items:center; gap:10px; padding:10px 14px; border-radius:10px; font-size:14px; font-weight:500; color:#525252; transition:all .2s; cursor:pointer; }

  /* ── Hero image ── */

  .ghana-bar { height:5px; background: linear-gradient(90deg, #006B3F 33%, #FCD116 33% 66%, #CE1126 66%); }

  .trust-seal { background:linear-gradient(135deg,#f0fdf4,#fefce8); border:1px solid #bbf7d0; border-radius:14px; }

</style>
</head>

let currentUser=DB.getObj('currentUser',null);
let logoClickCount=0,logoClickTimer=null;

const getCurrentUser=()=>DB.getObj('currentUser',null);
function setCurrentUser(u){currentUser=u;DB.set('currentUser',u);updateHeader();}
function logout(){setCurrentUser(null);showPage('home');toast('Logged out successfully','info');}

function updateHeader(){
  const u=getCurrentUser();
  const authBtns=document.getElementById('auth-btns');
  const userMenu=document.getElementById('user-menu');
  const cartBtn=document.getElementById('cart-btn');
  const navDash=document.getElementById('nav-dashboard');
  const navVendor=document.getElementById('nav-vendor');
  const mobDash=document.querySelector('.mobile-dashboard');
  const mobVendor=document.querySelector('.mobile-vendor');
  if(u){
    authBtns.classList.add('hidden');
    userMenu.classList.remove('hidden'); userMenu.classList.add('flex');
    document.getElementById('user-avatar').textContent=u.name.charAt(0).toUpperCase();
    document.getElementById('user-name-display').textContent=u.name.split(' ')[0];
    if(u.role==='buyer'){ cartBtn.classList.remove('hidden'); navDash.style.display=''; navDash.removeAttribute('style'); if(mobDash){mobDash.style.display='';mobDash.removeAttribute('style');} }
    if(u.role==='vendor'){ navVendor.style.display=''; navVendor.removeAttribute('style'); if(mobVendor){mobVendor.style.display='';mobVendor.removeAttribute('style');} }
    if(u.role==='admin'){ navDash.style.display=''; navDash.removeAttribute('style'); }
    updateCartBadge();
  } else {
    authBtns.classList.remove('hidden'); userMenu.classList.add('hidden');
    cartBtn.classList.add('hidden');
    navDash.style.display='none'; navVendor.style.display='none';
    if(mobDash)mobDash.style.display='none'; if(mobVendor)mobVendor.style.display='none';
  }
}

function updateCartBadge(){
  const cart=DB.get('cart',[]);
  const badge=document.getElementById('cart-badge');
  const total=cart.reduce((s,i)=>s+i.qty,0);
  if(total>0){badge.textContent=total;badge.classList.remove('hidden');}
  else{badge.classList.add('hidden');}
}

//  NAVIGATION

let currentPage='home';
function showPage(page,data=null){
  currentPage=page;
  document.querySelectorAll('.nav-link').forEach(l=>l.classList.toggle('active',l.dataset.page===page));
  const root=document.getElementById('app-root');
  root.innerHTML='<div class="flex justify-center items-center py-40"><div class="spinner"></div></div>';
  setTimeout(()=>{
    root.innerHTML='';
    const el=renderPage(page,data);
    root.appendChild(el);
    lucide.createIcons();
    window.scrollTo({top:0,behavior:'smooth'});
  },120);
}

function renderPage(page,data){
  const wrap=document.createElement('div');
  wrap.className='fade-up';
  switch(page){
    case 'home': wrap.innerHTML=pageHome(); break;
    case 'products': wrap.innerHTML=pageProducts(data); break;
    case 'product-detail': wrap.innerHTML=pageProductDetail(data); break;
    case 'login': wrap.innerHTML=pageLogin(); break;
    case 'register': wrap.innerHTML=pageRegister(); break;
    case 'cart': wrap.innerHTML=pageCart(); break;
    case 'checkout': wrap.innerHTML=pageCheckout(); break;
    case 'dashboard': wrap.innerHTML=pageDashboard(); break;
    case 'vendor-dashboard': wrap.innerHTML=pageVendorDashboard(); break;
    case 'order-success': wrap.innerHTML=pageOrderSuccess(data); break;
    default: wrap.innerHTML='<div class="text-center py-40 text-neutral-400">Page not found</div>';
  }
  wrap.querySelectorAll('[data-page]').forEach(el=>{
    el.addEventListener('click',e=>{e.preventDefault();showPage(el.dataset.page);});
  });
  return wrap;
}

//  TOAST
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toast(msg,type='success'){
  const cfg={success:{color:'#16a34a',icon:'check-circle'},error:{color:'#dc2626',icon:'x-circle'},info:{color:'#2563eb',icon:'info'},warning:{color:'#d97706',icon:'alert-triangle'}};
  const c=cfg[type]||cfg.success;
  const t=document.createElement('div');
  t.className='toast';
  t.innerHTML=`<span style="color:${c.color};flex-shrink:0"><i data-lucide="${c.icon}" style="width:20px;height:20px"></i></span><span style="font-size:14px;font-weight:500;color:#171717">${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  lucide.createIcons({nodes:[t]});
  setTimeout(()=>{t.style.animation='toastIn .3s reverse';setTimeout(()=>t.remove(),300);},3500);
}

//  MODAL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showModal(html){
  const ov=document.createElement('div');
  ov.className='modal-overlay';
  ov.innerHTML=`<div class="modal-box fade-up">${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});
  document.getElementById('modal-container').appendChild(ov);
  lucide.createIcons({nodes:[ov]});
}
function closeModal(){const mc=document.getElementById('modal-container');if(mc.lastChild)mc.lastChild.remove();}

function showAdminPasswordModal(){
  showModal(`
    <div class="text-center mb-6">
      <div class="w-16 h-16 rounded-2xl bg-brand flex items-center justify-center mx-auto mb-4">
        <i data-lucide="shield" style="width:28px;height:28px;color:white"></i>

    <div class="flex gap-3">
      <button onclick="closeModal()" class="btn-ghost flex-1 py-3 rounded-xl text-sm font-semibold">Cancel</button>
      <button onclick="checkAdminPw()" class="btn-primary flex-1 py-3 rounded-xl text-sm font-semibold">Enter</button>
    </div>
  `);
  setTimeout(()=>{const el=document.getElementById('admin-pw');if(el)el.focus();},100);

function checkAdminPw(){
  const pw=document.getElementById('admin-pw')?.value;
  if(pw==='kingdevilgh.com'){
    closeModal();
    const admin=DB.get('users',[]).find(u=>u.role==='admin');
    if(admin){setCurrentUser(admin);toast('Welcome, Admin! 🛡️','success');showPage('dashboard');}
  } else {
    toast('Incorrect password','error');
    const el=document.getElementById('admin-pw');if(el){el.value='';el.focus();}
  }
}

function sendWhatsAppOrder(vendor, order, buyerName, buyerPhone, deliveryAddress){
  const num = vendor.whatsapp.replace(/^0/,'');
  const itemsList = order.items.map(i=>`  • ${i.title} ×${i.qty} — GH₵${(i.price*i.qty).toLocaleString()}`).join('\n');
  const msg =
`🛒 *New Order – TrustLink Marketplace*

📦 *Order ID:* #${order.id.toUpperCase()}
📅 *Date:* ${new Date().toLocaleString('en-GH',{dateStyle:'medium',timeStyle:'short'})}

*Customer Details:*
👤 Name: ${buyerName}
📞 Phone: ${buyerPhone}
📍 Delivery: ${deliveryAddress}

*Items Ordered:*
${itemsList}

💰 *Subtotal:* GH₵${(order.total-30).toLocaleString()}
🚚 *Delivery Fee:* GH₵30
✅ *TOTAL PAID:* GH₵${order.total.toLocaleString()}
💳 *Payment:* ${order.paymentMethod}

Please confirm this order and contact the customer. Thank you! 🙏
_Powered by TrustLink Ghana_`;

  const url=`https://wa.me/233${num}?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

function searchProducts(q){
  const all=DB.get('products',[]).filter(p=>p.status==='approved');

  document.getElementById('products-grid').innerHTML=filtered.length?filtered.map(p=>productCard(p)).join(''):emptyState('search-x','No products match your search');
  lucide.createIcons();
}

let detailQty=1;
function changeQty(delta){detailQty=Math.max(1,detailQty+delta);const el=document.getElementById('qty-val');if(el)el.textContent=detailQty;}
function addToCartFromDetail(productId){
  const u=getCurrentUser();
  if(!u){toast('Please login to add to cart','warning');showPage('login');return;}

  addToCart(productId,detailQty);detailQty=1;
}

function addToCart(productId,qty=1){
  const p=DB.get('products',[]).find(pr=>pr.id===productId);
  if(!p)return;
  let cart=DB.get('cart',[]);
  const existing=cart.find(i=>i.productId===productId);
  if(existing){existing.qty=Math.min(existing.qty+qty,p.stock);}
  else{cart.push({productId,qty,price:p.price,title:p.title,image:p.images?.[0]||'',vendorId:p.vendorId});}
  DB.set('cart',cart);updateCartBadge();
  toast(`"${p.title.slice(0,28)}…" added to cart!`,'success');
}

function updateCartQty(productId,delta){
  let cart=DB.get('cart',[]);
  const item=cart.find(i=>i.productId===productId);if(!item)return;
  const p=DB.get('products',[]).find(pr=>pr.id===productId);
  item.qty=Math.max(1,Math.min(item.qty+delta,p?.stock||99));
  DB.set('cart',cart);updateCartBadge();showPage('cart');
}
function removeFromCart(productId){
  DB.set('cart',DB.get('cart',[]).filter(i=>i.productId!==productId));
  updateCartBadge();showPage('cart');toast('Item removed from cart','info');
}

    if(pm===method){el.classList.add('selected');}
    else{el.classList.remove('selected');}
    const dot=el.querySelector('.rounded-full');
    if(dot){
      if(pm===method){dot.className='ml-auto w-5 h-5 rounded-full border-2 border-green-600 bg-green-600 flex items-center justify-center';dot.innerHTML='<i data-lucide="check" style="width:12px;height:12px;color:white"></i>';}
      else{dot.className='ml-auto w-5 h-5 rounded-full border-2 border-neutral-300 flex items-center justify-center';dot.innerHTML='';}
    }
  });

    else d.innerHTML=`<input id="momo-number" class="input-field" placeholder="Card number (16 digits)" /><div class="grid grid-cols-2 gap-3 mt-3"><input class="input-field" placeholder="MM / YY" /><input class="input-field" placeholder="CVV" /></div>`;

function placeOrder(){
  const u=getCurrentUser();if(!u){showPage('login');return;}
  const name=document.getElementById('co-name')?.value.trim();
  const phone=document.getElementById('co-phone')?.value.trim();
  const address=document.getElementById('co-address')?.value.trim();
  const location=document.getElementById('co-location')?.value;
  if(!name||!phone||!address||!location){toast('Please fill all delivery details','warning');return;}

  // Simulate payment processing modal
  showModal(`
    <div class="text-center py-10">
      <div class="w-20 h-20 rounded-full bg-brand flex items-center justify-center mx-auto mb-6">
        <div class="spinner-white"></div>
      </div>
      <h2 class="text-xl font-bold mb-2">Processing Payment</h2>
      <p class="text-neutral-400 text-sm">Securing your payment via Paystack…</p>
    </div>
  `);

  setTimeout(()=>{
    closeModal();
    const cart=DB.get('cart',[]);
    const orders=DB.get('orders',[]);
    const delivery=30;
    const users=DB.get('users',[]);
    const pmLabel=selectedPayment==='mtn'?'MTN MoMo':selectedPayment==='vodafone'?'Vodafone Cash':'Card';

    // Group items by vendor
    const vendorGroups={};
    cart.forEach(item=>{
      if(!vendorGroups[item.vendorId])vendorGroups[item.vendorId]=[];
      vendorGroups[item.vendorId].push(item);
    });

    const newOrders=[];
    Object.entries(vendorGroups).forEach(([vendorId,items])=>{
      const total=items.reduce((s,i)=>s+(i.price*i.qty),0)+delivery;
      const commission=total*0.05;
      const orderId='ord'+genId();
      const order={
        id:orderId,buyerId:u.id,vendorId,
        items:items.map(i=>({productId:i.productId,title:i.title,price:i.price,qty:i.qty,image:i.image})),
        total,commission,
        deliveryAddress:`${address}, ${location}`,
        paymentMethod:pmLabel,
        status:'confirmed',
        buyerName:name,buyerPhone:phone,
        createdAt:new Date().toISOString(),
      };
      orders.push(order);
      newOrders.push({order,vendor:users.find(u=>u.id===vendorId)});
    });

    DB.set('orders',orders);
    DB.set('cart',[]);
    updateCartBadge();

    const grandTotal=cart.reduce((s,i)=>s+(i.price*i.qty),0)+delivery;
    const vendorNames=newOrders.map(o=>o.vendor?.storeName||'Vendor').join(', ');

    // Navigate to success page first
    showPage('order-success',{newOrders,grandTotal,name,phone,address:`${address}, ${location}`,pmLabel,vendorNames});

  },2500);
}

  const vf=document.getElementById('vendor-fields');if(vf)vf.style.display=role==='vendor'?'block':'none';

function doRegister(){
  const name=document.getElementById('reg-name')?.value.trim();
  const phone=document.getElementById('reg-phone')?.value.trim();

  const password=document.getElementById('reg-password')?.value;
  if(!name||!phone||!email||!password){toast('Please fill all fields','warning');return;}
  if(password.length<6){toast('Password must be at least 6 characters','warning');return;}
  const users=DB.get('users',[]);
  if(users.find(u=>u.email===email)){toast('Email already registered','error');return;}
  const nu={id:'usr'+genId(),name,email,phone,password,role:regRole,status:regRole==='vendor'?'pending':'approved',createdAt:new Date().toISOString()};
  if(regRole==='vendor'){
    const store=document.getElementById('reg-store')?.value.trim();
    const loc=document.getElementById('reg-location')?.value;

    if(!store||!loc||!wa){toast('Please fill all vendor details','warning');return;}
    nu.storeName=store;nu.location=loc;nu.whatsapp=wa;

  users.push(nu);DB.set('users',users);
  if(regRole==='buyer'){setCurrentUser(nu);toast('Welcome to TrustLink! 🎉','success');showPage('home');}
  else{toast('Vendor account submitted! Awaiting admin approval.','info');showPage('login');}
}

function aiSuggest(){
  const title=document.getElementById('ap-title')?.value.trim();
  if(!title){toast('Enter a product title first','warning');return;}
  const btn=event.target.closest('button');
  const orig=btn.innerHTML;
  btn.innerHTML='<div class="spinner-white" style="width:15px;height:15px"></div>';btn.disabled=true;
  setTimeout(()=>{
    const t=title.toLowerCase();
    let s;
    if(t.includes('phone')||t.includes('laptop')||t.includes('tv')||t.includes('gadget'))
      s={d:`Premium ${title} designed for Ghanaian professionals. Features cutting-edge technology, excellent build quality, and comprehensive warranty. Perfect for work, education, and entertainment.`,p:Math.floor(Math.random()*3000)+500};
    else if(t.includes('cloth')||t.includes('kente')||t.includes('dress')||t.includes('fabric'))
      s={d:`Beautifully crafted ${title} inspired by Ghana's rich textile heritage. Made from premium quality fabric with attention to detail. Suitable for all occasions — from weddings to cultural festivals.`,p:Math.floor(Math.random()*400)+80};
    else if(t.includes('food')||t.includes('rice')||t.includes('palm')||t.includes('pepper'))
      s={d:`Farm-fresh ${title} sourced directly from Ghanaian farmers. 100% natural, no additives. Packed hygienically for long freshness. Rich in authentic Ghanaian flavour.`,p:Math.floor(Math.random()*100)+15};
    else
      s={d:`High-quality ${title} crafted for the Ghanaian market. Meets international standards with reliable performance and durability. Join thousands of satisfied customers across Ghana.`,p:Math.floor(Math.random()*500)+50};
    const d=document.getElementById('ap-desc');const p=document.getElementById('ap-price');
    if(d)d.value=s.d;if(p)p.value=s.p;
    btn.innerHTML=orig;btn.disabled=false;lucide.createIcons({nodes:[btn]});
    toast('AI suggestion applied ✨','success');
  },1300);
}

function submitProduct(vendorId){
  const title=document.getElementById('ap-title')?.value.trim();
  const desc=document.getElementById('ap-desc')?.value.trim();
  const price=parseFloat(document.getElementById('ap-price')?.value);
  const stock=parseInt(document.getElementById('ap-stock')?.value);
  const category=document.getElementById('ap-category')?.value;
  if(!title||!desc||!price||!stock||!category){toast('Please fill all required fields','warning');return;}
  const images=[];
  for(let i=1;i<=6;i++){const v=document.getElementById(`ap-img-${i}`)?.value.trim();if(v)images.push(v);}
  if(!images.length)images.push('https://images.unsplash.com/photo-1560472354-b33ff0c44a43?w=600');
  const ps=DB.get('products',[]);
  ps.push({id:'prod'+genId(),vendorId,title,description:desc,price,stock,category,images,status:'pending',rating:0,reviews:0,createdAt:new Date().toISOString()});
  DB.set('products',ps);imgFieldCount=3;
  toast('Product submitted for approval!','success');window._vendorTab='products';showPage('vendor-dashboard');
}

  us[idx].location=document.getElementById('ev-loc').value.trim();
  us[idx].whatsapp=document.getElementById('ev-wa').value.trim();
  DB.set('users',us);closeModal();toast('Vendor updated!','success');setAdminTab('vendors');
}

function deleteUserAdmin(uid){
  if(!confirm('Delete this user permanently?'))return;
  DB.set('users',DB.get('users',[]).filter(u=>u.id!==uid));
  toast('User deleted','info');setAdminTab(window._adminTab||'vendors');
}

function renderAdminProducts(products,users){
  return`
  <div class="card overflow-hidden">
    <div class="overflow-x-auto">
    <table>
      <thead><tr><th>Product</th><th>Vendor</th><th>Price</th><th>Category</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${products.map(p=>{
          const vendor=users.find(u=>u.id===p.vendorId);
          return`
          <tr>
            <td>
              <div class="flex items-center gap-3">
                <img src="${p.images?.[0]||''}" class="w-12 h-12 rounded-xl object-cover border border-neutral-100" onerror="this.style.display='none'" />
                <span class="font-semibold text-sm">${p.title.slice(0,35)}${p.title.length>35?'…':''}</span>
              </div>
            </td>
            <td class="text-sm text-neutral-500 font-medium">${vendor?.storeName||'Unknown'}</td>
            <td class="font-black price-tag">GH₵${p.price.toLocaleString()}</td>
            <td class="text-xs text-neutral-500 font-medium">${p.category}</td>
            <td><span class="badge badge-${p.status}">${p.status}</span></td>
            <td>
              <div class="flex gap-2 flex-wrap">
                ${p.status!=='approved'?`<button onclick="approveProduct('${p.id}')" class="badge badge-approved cursor-pointer hover:opacity-80">Approve</button>`:''}
                <button onclick="editProductAdmin('${p.id}')" class="btn-ghost text-xs px-3 py-1.5 rounded-lg font-semibold">Edit</button>
                <button onclick="deleteProductAdmin('${p.id}')" class="btn-danger text-xs px-3 py-1.5 rounded-lg font-semibold">Delete</button>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
  </div>`;
}

function approveProduct(pid){
  const ps=DB.get('products',[]);const p=ps.find(pr=>pr.id===pid);
  if(p){p.status='approved';DB.set('products',ps);toast('Product approved!','success');}
  setAdminTab('products');
}

function editProductAdmin(pid){
  const ps=DB.get('products',[]);const p=ps.find(pr=>pr.id===pid);if(!p)return;
  const cats=['Electronics','Fashion & Clothing','Jewelry & Accessories','Home & Living','Food & Beverages','Health & Beauty','Agriculture','Art & Crafts','Sports & Outdoors','Books & Education'];
  showModal(`
    <h2 class="text-xl font-black mb-6">Edit Product</h2>
    <div class="space-y-4">
      <div><label class="text-xs font-bold text-neutral-500 mb-2 block uppercase tracking-wide">Title</label><input id="epa-title" class="input-field" value="${p.title}" /></div>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="text-xs font-bold text-neutral-500 mb-2 block uppercase tracking-wide">Price (GH₵)</label><input id="epa-price" type="number" class="input-field" value="${p.price}" /></div>
        <div><label class="text-xs font-bold text-neutral-500 mb-2 block uppercase tracking-wide">Category</label><select id="epa-cat" class="input-field">${cats.map(c=>`<option value="${c}" ${p.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
      </div>
      <div><label class="text-xs font-bold text-neutral-500 mb-2 block uppercase tracking-wide">Image URLs (one per line)</label><textarea id="epa-images" class="input-field" rows="5">${(p.images||[]).join('\n')}</textarea></div>
      <div class="flex gap-3 pt-2">
        <button onclick="closeModal()" class="btn-ghost flex-1 py-3 rounded-xl font-semibold">Cancel</button>
        <button onclick="saveProductAdmin('${pid}')" class="btn-primary flex-1 py-3 rounded-xl font-semibold">Save</button>
      </div>
    </div>
  `);
}

function saveProductAdmin(pid){
  const ps=DB.get('products',[]);const idx=ps.findIndex(p=>p.id===pid);if(idx===-1)return;
  ps[idx].title=document.getElementById('epa-title').value.trim();
  ps[idx].price=parseFloat(document.getElementById('epa-price').value)||ps[idx].price;
  ps[idx].category=document.getElementById('epa-cat').value;
  ps[idx].images=document.getElementById('epa-images').value.split('\n').map(s=>s.trim()).filter(Boolean);
  DB.set('products',ps);closeModal();toast('Product updated!','success');setAdminTab('products');
}

function deleteProductAdmin(pid){
  if(!confirm('Delete this product?'))return;
  DB.set('products',DB.get('products',[]).filter(p=>p.id!==pid));
  toast('Product deleted','info');setAdminTab('products');
}

function renderAdminUsers(users){
  return`
  <div class="card overflow-hidden">
    <div class="overflow-x-auto">
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody>
        ${users.filter(u=>u.role!=='admin').map(u=>`
        <tr>
          <td class="font-semibold text-neutral-800">${u.name}</td>
          <td class="text-sm text-neutral-500">${u.email}</td>
          <td class="text-sm text-neutral-500">${u.phone}</td>
          <td><span class="badge ${u.role==='vendor'?'badge-pending':'badge-approved'} capitalize">${u.role}</span></td>
          <td><span class="badge badge-${u.status}">${u.status}</span></td>
          <td>
            <div class="flex gap-2">
              <button onclick="resetPasswordAdmin('${u.id}')" class="btn-ghost text-xs px-3 py-1.5 rounded-lg font-semibold">Reset PW</button>
              <button onclick="deleteUserAdmin('${u.id}')" class="btn-danger text-xs px-3 py-1.5 rounded-lg font-semibold">Delete</button>
            </div>
          </td>
        </tr>`).join('')}
      </tbody>
    </table>
    </div>
  </div>`;
}

function resetPasswordAdmin(uid){
  showModal(`
    <h2 class="text-xl font-black mb-6">Reset Password</h2>
    <div class="space-y-4">
      <div><label class="text-xs font-bold text-neutral-500 mb-2 block uppercase tracking-wide">New Password</label><input id="rp-new" type="password" class="input-field" placeholder="Min. 6 characters" /></div>
      <div class="flex gap-3 pt-2">
        <button onclick="closeModal()" class="btn-ghost flex-1 py-3 rounded-xl font-semibold">Cancel</button>
        <button onclick="doResetPw('${uid}')" class="btn-primary flex-1 py-3 rounded-xl font-semibold">Reset Password</button>
      </div>
    </div>
  `);
}

function doResetPw(uid){
  const pw=document.getElementById('rp-new')?.value;
  if(!pw||pw.length<6){toast('Password must be at least 6 characters','warning');return;}
  const us=DB.get('users',[]);const u=us.find(u=>u.id===uid);
  if(u){u.password=pw;DB.set('users',us);closeModal();toast('Password reset successfully!','success');}
}
